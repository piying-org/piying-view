<ng-template #fieldTemplate let-field let-injector="injector">
  @let renderConfig = field.renderConfig();
  @if (field.define && !renderConfig?.hidden) {
    <ng-container
      [ngComponentOutlet]="field.define()"
      [ngComponentOutletWrappers]="field.wrappers()"
      [ngComponentOutletField]="field"
      [ngComponentOutletDirectives]="field.directives"
      [ngComponentOutletInjector]="injector ?? injector3$$()"
    ></ng-container>
  }
</ng-template>
<ng-template #templateRef>
  @if (resolvedField$(); as field) {
    <ng-container
      *ngTemplateOutlet="
        fieldTemplate;
        context: {
          $implicit: field,
          injector: injector3$$(),
        }
      "
    ></ng-container>
  }
</ng-template>
@if (!selectorless()) {
  <ng-container *ngTemplateOutlet="templateRef"></ng-container>
}
