<ng-template
  #nextTemplate
  let-injector="injector"
  let-index="index"
  let-fieldConfig="fieldConfig"
>
  @if (injector(); as injector) {
    <ng-template
      [fieldOutlet]="fieldConfig"
      [index]="index"
      [injector]="injector"
    ></ng-template>
  }
</ng-template>

<ng-template #fieldTemplate let-field let-injector="injector">
  @let renderConfig = field.renderConfig();
  @if (field.define && !renderConfig?.hidden) {
    @let define = field.define();
    <ng-template
      [fieldOutlet]="field"
      [index]="0"
      [injector]="injector ?? injector3$$() | listInjector"
      [listen]="
        field.wrappers()
          | listen
            : (define.inputs | inputKeys)
            : (define.outputs | inputKeys)
            : define.type
      "
    ></ng-template>
  }
</ng-template>

<ng-template #templateRef>
  @if (resolvedField$(); as field) {
    <ng-container
      *ngTemplateOutlet="
        fieldTemplate;
        context: {
          $implicit: field,
          injector: injector3$$(),
        }
      "
    ></ng-container>
  }
</ng-template>
@if (!selectorless()) {
  <ng-container *ngTemplateOutlet="templateRef"></ng-container>
}
